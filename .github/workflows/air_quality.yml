name: Post Air Quality to Facebook via Buffer

on:
  schedule:
    # 8:00 AM Pacific Time (15:00 UTC) — morning update
    - cron: '0 15 * * *'
    # 4:00 PM Pacific Time (23:00 UTC) — afternoon update
    - cron: '0 23 * * *'

  # Lets you trigger a test run manually from the Actions tab
  workflow_dispatch:

jobs:
  post-air-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run air quality poster
        env:
          AIRNOW_API_KEY:    ${{ secrets.AIRNOW_API_KEY }}
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: python post_air_quality.py
