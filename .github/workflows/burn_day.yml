name: Post Burn Day Status to Facebook via Buffer

on:
  # Triggered by Power Automate when burn day email arrives
  repository_dispatch:
    types: [burn_day]

  # Lets you trigger a test run manually from the Actions tab
  workflow_dispatch:
    inputs:
      burn_status:
        description: 'Burn status subject line for manual testing'
        required: false
        default: 'Burn Call for Mendocino County: Thursday, May 21, 2026 is a Permissive Burn Day'

jobs:
  post-burn-day:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run burn day poster
        env:
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          # Use dispatch payload if triggered by Power Automate,
          # otherwise use manual input for testing
          BURN_STATUS: ${{ github.event.client_payload.burn_status || github.event.inputs.burn_status }}
        run: python post_burn_day.py
